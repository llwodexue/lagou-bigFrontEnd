<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title id="page-title">产品说明</title>
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="version" content="0.1.0" />
    <style>
      html,
      body,
      h1,
      p,
      strong {
        margin: 0;
        padding: 0;
        outline: 0;
        border: 0;
        background: transparent;
        vertical-align: baseline;
        font-style: inherit;
        font-size: 100%;
      }

      html {
        height: 100%;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          Helvetica Neue,
          Helvetica,
          sans-serif;
        line-height: normal;
        -ms-text-size-adjust: 100%;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-size: 14px;
        line-height: 1.3;
        -webkit-user-select: none;
      }

      #app {
        display: -webkit-box;
        display: -webkit-flex;
        display: -moz-flex;
        display: flex;
        -webkit-box-orient: vertical;
        -webkit-box-direction: normal;
        -webkit-flex-direction: column;
        flex-direction: column;
        padding: 2.66666667vw;
      }

      h2 {
        width: 100%;
        text-align: center;
      }

      h1 {
        margin: 2vw 0;
      }

      p {
        margin: 0.66666667vw 0;
        line-height: 140%;
      }

      strong {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h2>“企业员工计次票”产品规则</h2>
      <h1>　　一、产品概况</h1>
      <div id="first-con"></div>
      <h1>　　二、产品购买规则</h1>
      <div id="second-con"></div>
      <h1>　　三、使用规则</h1>
      <div id="third-con"></div>
      <h1>　　四、异常处理</h1>
      <div id="fourth-con"></div>
      <h1>　　五、其他条款</h1>
      <div id="fifth-con"></div>
    </div>

    <script>
      var firstInfo = [
        '1.“企业员工计次票”是由铁路局与属地企业联合设计的指定区间、指定有效期、企业员工共享使用的计次票产品，由企业支付票款购买并指定共享员工名单。',
        '2.产品启用：企业购买产品后需在30日内绑定共享使用产品的人员信息，第一次成功绑定使用人既启用产品。30日内未启用产品的，产品自动失效并全额退款。',
        '3.适用车次：在产品指定区间开行符合产品规定的列车，具体参见团体票网站、12306网站和“铁路12306”手机APP可预约车次。',
        '4.有效期计算：有效期从产品启用之日起计算。',
        '5.产品定价：本产品不区分不同车次票价差异，定价按所有车次同席别实际执行票价统算，并实行相应折扣优惠，具体以发售价格为准。',
        '6.适用期限：暂无限制使用日期。',
        '7.适用群体：本产品适合员工有长期固定区间商务差旅、通勤需求的企业，为全价成人票。',
      ];
      var firstCon = document.getElementById('first-con');
      firstCon.innerHTML = firstInfo
        .map((item) => {
          return '<p>' + '　　' + item + '</p>';
        })
        .join('\n');

      var secondInfo = [
        '1.购买渠道：铁路团体票网站。',
        '2.购买数量：购买时，企业可以同时购买多个产品，但是同一发到站的产品最多只能有一个处于未启用状态。',
        '3.绑定限制：企事业单位及其管理人员绑定的使用人需为对应企业成人员工，且需通过12306身份信息核验。',
        '4.退款规则：产品一经启用乘车，票款不予退还。产品未启用的，由企业管理人员通过原购买渠道申请退款，退款在15个工作日内通过原支付方式全额退还。',
      ];
      var secondCon = document.getElementById('second-con');
      secondCon.innerHTML = secondInfo
        .map((item) => {
          return '<p>' + '　　' + item + '</p>';
        })
        .join('\n');

      var thirdInfo = [
        '1.共享人员管理：购买产品后，企业管理人员可通过团体票网站绑定共用产品次数的人员信息，指定员工共享产品的最大次数以及使用时间范围。',
        '2.个人使用规则：企业员工可按已绑定的最大次数共享企业计次票产品，仅限绑定的员工本人使用，不能转让或共用。仅限在产品指定的发到站使用，预约或乘坐绑定时指定的席别，不得在中途站上下车或越站使用，不得跨席别使用。',
        '3.个人预约规定：企业员工可使用与绑定证件号关联的12306账号登录12306网站或铁路12306APP，在“计次·定期票”查看本人可用企业计次票并预约席位，也可持绑定时指定的有效身份证件原件在自动售票机预约席位。产品可预约的席位与12306可售车票一致。',
        [
          '每个绑定订单最多可预约4个待使用席位。',
          '仅可预约预售期内的席位。',
          '行程变更时，应于开车前取消所预约的席位，不收取费用；未取消预约的视为一次乘车。',
          '开车前48小时内预约席位取消次数累计达到5次的，可预约的待使用席位数量调整为1个。',
        ],
        '4.个人直接刷证乘车规定：仅限乘坐已绑定产品指定发到站的列车。凭绑定时的有效身份证件原件，于列车检票时在检票闸机或人工检票口获取产品指定席别席位后方可乘车。产品直接刷证使用的席位与12306可售车票一致。',
        [
          '获取的席位信息通过短信推送至乘车人预留手机号。',
          '如乘车人已购买所乘车次的单程电子客票，优先使用单程电子客票。',
          '乘车人如持有多个适用于所检车次的产品，需到人工检票口选择相应产品检票进站。',
        ],
        '5.乘车规定：须按照预约席位或检票时获取的席位乘车，并配合列车工作人员查验车票。',
        '6.出站规定：须持购买产品时所使用的有效身份证件原件通过检票闸机或人工检票口检票出站。',
      ];
      var thirdCon = document.getElementById('third-con');
      thirdCon.innerHTML = thirdInfo
        .map((item) => {
          if (typeof item !== 'string') {
            return item
              .map((i) => {
                return '<strong>' + '　　·	' + i + '</strong>';
              })
              .join('\n');
          }
          return '<p>' + '　　' + item + '</p>';
        })
        .join('\n');

      var fourthInfo = [
        '1.列车工作人员查验车票时，发现乘车人实际所乘区间及席别与所持产品指定发到站和席别相符，但产品无进站检票记录的，由工作人员补填本次列车的电子乘车记录；发现乘车人实际所乘区间及席别与所持产品指定发到站或席别不符的，按无票人员进行补票。',
        '2.乘车人在产品指定发到站出站时，如没有席位预约记录、进站检票记录或列车补填的电子乘车记录之一的，按无票人员进行补票。',
        '3. 乘车人在非产品指定乘车站出站时，由车站到达补票窗口按规定补收实际所乘区间票款。乘车人持产品乘车时已检票的，视情况恢复产品使用次数。',
        '4.如因不可抗力或铁路责任造成企业计次票产品不能在有效期内完全使用的，由企业在团体票网站申请退款，退款金额＝原购票款×（产品剩余乘车次数÷产品限定乘车次数），退款在产品有效期结束后30日内，经审核确认后按原支付方式退还。',
      ];
      var fourthCon = document.getElementById('fourth-con');
      fourthCon.innerHTML = fourthInfo
        .map((item) => {
          return '<p>' + '　　' + item + '</p>';
        })
        .join('\n');

      var fifthInfo = [
        '1. 信息查询：员工个人可通过12306网站、“铁路12306”手机APP查询已绑定的产品相关信息；也可持绑定时所使用的乘车人有效身份证件原件在自动售票机进行查询。企业管理人员可通过团体票网站查询产品使用明细',
        '2. 报销凭证：自产品启用至有效期结束后180天内，企业可到车站指定窗口换取报销凭证。也可以在产品次数使用完5日后或产品失效后180天内在企业团体票网站开具电子发票。 ',
        '3. 积分累积：企业员工计次票不再针对员工个人的乘车记录进行积分累积。',
        '4. 用户在使用本产品时，可能存在临时预约不到所需车次的风险，也存在无法直接刷证检票乘车的风险，敬请用户做好行程规划，尽量提前预约席位。',
        '5.铁路运输企业有权对以上规则进行修改，并在企业团体票网站或12306网站对外公告。对于有损害铁路运输企业合法权益行为的用户，有权视情况单方面拒绝向其发售本产品。',
        '6.本规则未尽事宜按《铁路旅客运输规程》、《铁路旅客电子客票暂行实施办法》和相关规定执行。',
        '7.客户如有疑问，请拨打铁路客服电话12306咨询。',
      ];
      var fifthCon = document.getElementById('fifth-con');
      fifthCon.innerHTML = fifthInfo
        .map((item) => {
          return '<p>' + '　　' + item + '</p>';
        })
        .join('\n');
    </script>
  </body>
</html>
