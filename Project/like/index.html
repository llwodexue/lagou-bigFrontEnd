<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .like-button {
      --color: #2b3044;
      --color-hover: #2b3044;
      --color-active: #fff;
      --icon: #bbc1e1;
      --icon-hover: #8a91b4;
      --icon-active: #fff;
      --background: #fff;
      --background-hover: #fff;
      --background-active: #362a89;
      --border: #e1e6f9;
      --border-active: #362a89;
      --shadow: #{rgba(#001177, 0.025)};
      display: block;
      outline: none;
      cursor: pointer;
      position: relative;
      border: 0;
      background: none;
      padding: 8px 20px 8px 20px;
      border-radius: 6px;
      line-height: 27px;
      font-family: inherit;
      font-weight: 500;
      font-size: 14px;
      white-space: nowrap;
      color: var(--color);
      -webkit-appearance: none;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.2s linear;
      &.dark {
        --color: #f6f8ff;
        --color-hover: #f6f8ff;
        --color-active: #fff;
        --icon: #8a91b4;
        --icon-hover: #bbc1e1;
        --icon-active: #fff;
        --background: #2b3044;
        --background-hover: #171827;
        --background-active: #275efe;
        --border: transparent;
        --border-active: transparent;
        --shadow: #{rgba(#001177, 0.16)};
      }
      &:hover {
        --icon: var(--icon-hover);
        --color: var(--color-hover);
        --background: var(--background-hover);
        --border-width: 2px;
      }
      &:active {
        --scale: 0.95;
      }
      &:not(.liked) {
        &:hover {
          --hand-rotate: 8;
          --hand-thumb-1: -12deg;
          --hand-thumb-2: 36deg;
        }
      }
      &.liked {
        --span-x: 2px;
        --span-d-o: 1;
        --span-d-x: 0;
        --icon: var(--icon-active);
        --color: var(--color-active);
        --border: var(--border-active);
        --background: var(--background-active);
      }
      &:before {
        content: '';
        min-width: 103px;
        position: absolute;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        border-radius: inherit;
        transition: background 0.2s linear, transform 0.2s, box-shadow 0.2s linear;
        transform: scale(var(--scale, 1)) translateZ(0);
        background: var(--background);
        box-shadow: inset 0 0 0 var(--border-width, 1px) var(--border),
          0 4px 8px var(--shadow), 0 8px 20px var(--shadow);
      }
      .hand {
        width: 11px;
        height: 11px;
        border-radius: 2px 0 0 0;
        background: var(--icon);
        position: relative;
        margin: 10px 8px 0 0;
        transform-origin: -5px -1px;
        transition: transform 0.25s, background 0.2s linear;
        transform: rotate(calc(var(--hand-rotate, 0) * 1deg)) translateZ(0);
        &:before,
        &:after {
          content: '';
          background: var(--icon);
          position: absolute;
          transition: background 0.2s linear, box-shadow 0.2s linear;
        }
        &:before {
          left: -5px;
          bottom: 0;
          height: 12px;
          width: 4px;
          border-radius: 1px 1px 0 1px;
        }
        &:after {
          right: -3px;
          top: 0;
          width: 4px;
          height: 4px;
          border-radius: 0 2px 2px 0;
          background: var(--icon);
          box-shadow: -0.5px 4px 0 var(--icon), -1px 8px 0 var(--icon),
            -1.5px 12px 0 var(--icon);
          transform: scaleY(0.6825);
          transform-origin: 0 0;
        }
        .thumb {
          background: var(--icon);
          width: 10px;
          height: 4px;
          border-radius: 2px;
          transform-origin: 2px 2px;
          position: absolute;
          left: 0;
          top: 0;
          transition: transform 0.25s, background 0.2s linear;
          transform: scale(0.85) translateY(-0.5px) rotate(var(--hand-thumb-1, -45deg))
            translateZ(0);
          &:before {
            content: '';
            height: 4px;
            width: 7px;
            border-radius: 2px;
            transform-origin: 2px 2px;
            background: var(--icon);
            position: absolute;
            left: 7px;
            top: 0;
            transition: transform 0.25s, background 0.2s linear;
            transform: rotate(var(--hand-thumb-2, -45deg)) translateZ(0);
          }
        }
      }
    }
  </style>
  <body>
    <button class="like-button dark">
      <div class="hand">
        <div class="thumb"></div>
      </div>
      <span>
        Like
        <span>d</span>
      </span>
    </button>
  </body>
  <script>
    document.querySelectorAll('.like-button').forEach(button => {
      button.addEventListener('click', e => {
        button.classList.toggle('liked')
        if (button.classList.contains('liked')) {
          gsap.fromTo(
            button,
            {
              '--hand-rotate': 8
            },
            {
              ease: 'none',
              keyframes: [
                {
                  '--hand-rotate': -45,
                  duration: 0.16,
                  ease: 'none'
                },
                {
                  '--hand-rotate': 15,
                  duration: 0.12,
                  ease: 'none'
                },
                {
                  '--hand-rotate': 0,
                  duration: 0.2,
                  ease: 'none',
                  clearProps: true
                }
              ]
            }
          )
        }
      })
    })
  </script>
</html>
